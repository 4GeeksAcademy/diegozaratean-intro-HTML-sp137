<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fromularios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <style>

        </style>
</head>

<body>


    <h1>Bienvendios a los formularios 📝</h1>


    <form class="bg-info w-50 mx-auto m-4 p-5 text-light rounded-4 shadow-lg">
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Email address</label>
            <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
            <div id="emailHelp" class="form-text text-light">We'll never share your email with anyone else.</div>
        </div>
        <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Password</label>
            <input type="password" class="form-control" id="exampleInputPassword1">
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="exampleCheck1">
            <label class="form-check-label" for="exampleCheck1">Check me out</label>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>

    <form method="get">

        <fieldset>
            <legend>Datos usuario</legend>

            <div>
                <label for="name">Nombre:</label>
                <input type="text" name="name" id="name" placeholder="ingresa tu nombre">
            </div>
            <div>
                <label for="email">Correo:</label>
                <input type="email" name="email" id="email" placeholder="ingresa tu email">
            </div>
            <div>
                <label for="clave">Clave:</label>
                <input type="password" name="clave" id="clave" placeholder="ingresa tu clave">
            </div>
        </fieldset>

        <div>
            <h4>Envio</h4>
            <label for="express">express</label>
            <input type="radio" name="envio" id="express">
            <br />
            <label for="normal">normal</label>
            <input type="radio" name="envio" id="normal">
            <br />
            <label for="programado">programado</label>
            <input type="radio" name="envio" id="programado">
            <br />
            <h4>Alitamiento</h4>
            <label for="alist_express">express</label>
            <input type="radio" name="alist_" id="alist_express">
            <br />
            <label for="alist_normal">normal</label>
            <input type="radio" name="alist_" id="alist_normal">
        </div>

        <div>
            <select name="pago" id="pago">
                <option value="Tarjeta_de_credito">Tarjeta de credito</option>
                <option value="transfer">Bizum</option>
                <option value="apple">Apple pay</option>
            </select>
        </div>

        <div>
            <input type="submit" value="enviar">
            <input type="reset" value="reset">
            <input type="button" value="boton">
            <button>boton</button>
        </div>
    </form>

</body>

</html>
